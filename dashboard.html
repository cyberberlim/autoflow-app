<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | AUTOFLOW</title>
  <style>
    /* ======= ESTILO GERAL ======= */
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #0a0a0a, #111111);
      color: #fff;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ======= SIDEBAR ======= */
    .sidebar {
      width: 240px;
      background-color: #111111;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      font-size: 1.5em;
      font-weight: 700;
      color: #00ff88;
      text-align: center;
      margin-bottom: 30px;
    }

    .nav-links {
      list-style: none;
      padding: 0;
    }

    .nav-links li {
      margin: 15px 0;
    }

    .nav-links a {
      text-decoration: none;
      color: #fff;
      padding: 10px 15px;
      display: block;
      border-radius: 8px;
      transition: 0.3s;
    }

    .nav-links a:hover,
    .nav-links .active {
      background: linear-gradient(90deg, #00ff88, #00d4ff);
      color: #000;
      font-weight: 600;
    }

    .logout-btn {
      background: linear-gradient(90deg, #00ff88, #00d4ff);
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .logout-btn:hover {
      opacity: 0.9;
    }

    /* ======= CONTEÚDO PRINCIPAL ======= */
    .main-content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2em;
      color: #fff;
    }

    .header span {
      color: #888;
    }

    /* ======= CARDS DE MÉTRICAS ======= */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      font-size: 1em;
      color: #ccc;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 1.8em;
      font-weight: 700;
    }

    .verde { color: #00ff88; }
    .azul { color: #00d4ff; }
    .branco { color: #ffffff; }
