<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard - AUTOFLOW</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  "https://sosutpvrosylcabjyaga.supabase.co",
  "SUA_ANON_KEY_AQUI"
);

document.addEventListener("DOMContentLoaded", async () => {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
  } else {
    document.getElementById("email").innerText = user.email;
  }
});

async function logout() {
  await supabase.auth.signOut();
  window.location.href = "login.html";
}
</script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

<div class="bg-zinc-900 p-10 rounded-xl">
  <h1 class="text-2xl mb-4">Bem-vindo 👋</h1>
  <p id="email" class="mb-6 text-green-400"></p>

  <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">
    Sair
  </button>
</div>

</body>
  </html>
