<!doctype html>
<html lang="pt-BR" class="h-full">    
<head>    
  <meta charset="UTF-8">    
  <meta name="viewport" content="width=device-width, initial-scale=1.0">    
  <title>Clientes - AUTOFLOW</title>    
  <script src="/_sdk/element_sdk.js"></script>    
  <script src="/_sdk/data_sdk.js"></script>    
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>    
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet">    
  <style>    
    * { box-sizing: border-box; }    
    html, body { height: 100%; margin: 0; padding: 0; }    
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #111111 50%, #0d0d0d 100%); color: #fff; overflow-x: hidden; }    
    .font-display { font-family: 'Space Grotesk', sans-serif; }  
    .gradient-text { background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 800; letter-spacing: -0.5px; }  
    .logo-container { display: flex; flex-direction: column; gap: 0.25rem; }  
    .logo-text { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }  
    .logo-subtitle { font-size: 0.625rem; letter-spacing: 1px; color: rgba(0, 255, 136, 0.6); text-transform: uppercase; font-weight: 600; }  
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }  
    .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }  
    .glass-card:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(0, 255, 136, 0.3); transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 255, 136, 0.1); }  
    .btn-neon { background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%); color: #000; font-weight: 600; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 4px 20px rgba(0, 255, 136, 0.3); position: relative; overflow: hidden; }  
    .btn-neon::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.2); transition: left 0.4s ease; }  
    .btn-neon:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0, 255, 136, 0.5), 0 0 20px rgba(0, 212, 255, 0.3); }  
    .btn-neon:hover::before { left: 100%; }  
    .btn-neon:active { transform: translateY(0); box-shadow: 0 2px 15px rgba(0, 255, 136, 0.4); }  
    .btn-neon:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }  
    .sidebar-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1rem; border-radius: 0.75rem; color: rgba(255, 255, 255, 0.6); transition: all 0.2s ease; text-decoration: none; cursor: pointer; }  
    .sidebar-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }  
    .sidebar-item.active { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.2); }  
    .neon-icon { color: #00ff88; filter: drop-shadow(0 0 8px rgba(0, 255, 136, 0.5)); }  
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 100; }  
    .modal-overlay.active { display: flex; }  
    .modal-content { background: linear-gradient(135deg, #1a1a1a 0%, #111111 100%); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; padding: 2rem; max-width: 500px; width: 90%; max-height: 90%; overflow-y: auto; animation: modalSlideIn 0.3s ease; }  
    @keyframes modalSlideIn { from { opacity: 0; transform: translateY(-20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }  
    .form-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 0.875rem 1rem; color: #fff; font-size: 0.95rem; transition: all 0.2s ease; }  
    .form-input:focus { outline: none; border-color: rgba(0, 255, 136, 0.5); box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }  
    .form-select { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 0.875rem 1rem; color: #fff; font-size: 0.95rem; cursor: pointer; }  
    .form-select option { background: #1a1a1a; color: #fff; }  
    .empty-state { text-align: center; padding: 4rem 2rem; color: rgba(255, 255, 255, 0.4); }  
  </style>
</head>
<body class="h-full">
  <div class="flex h-full w-full">
    <!-- Sidebar -->
    <!-- [SEU HTML DA SIDEBAR AQUI] -->
    <!-- Main Content -->
    <main class="main-content flex-1 ml-64 p-8 overflow-y-auto h-full">
      <!-- Header e Cards -->
      <!-- [SEU HTML DOS CARDS E HISTÓRICO AQUI] -->

      <!-- Clients Grid -->
      <div id="clientsContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <div id="emptyState" class="col-span-full empty-state">
          <svg class="w-16 h-16 mx-auto mb-4 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <p class="text-lg font-medium mb-2">Nenhum cliente cadastrado</p>
          <p class="text-sm">Clique em "Novo Cliente" para adicionar o primeiro atendimento</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Novo Cliente -->
  <div id="modalNovoCliente" class="modal-overlay">
    <div class="modal-content">
      <div class="flex items-center justify-between mb-6">
        <h2 class="font-display text-xl font-bold">Novo Atendimento</h2>
        <button id="closeModal" class="p-2 rounded-lg hover:bg-white/10 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <form id="formNovoCliente" class="space-y-4">
        <div>
          <label for="clientName" class="block text-sm text-white/60 mb-2">Nome do Cliente</label>
          <input type="text" id="clientName" class="form-input" placeholder="Digite o nome do cliente" required>
        </div>
        <div>
          <label for="clientService" class="block text-sm text-white/60 mb-2">Serviço Realizado</label>
          <select id="clientService" class="form-select" required>
            <option value="">Selecione o serviço</option>
            <option value="Lavagem Simples" data-value="50">Lavagem Simples - R$ 50</option>
            <option value="Lavagem Detalhada" data-value="80">Lavagem Detalhada - R$ 80</option>
            <option value="Lavagem Completa" data-value="120">Lavagem Completa - R$ 120</option>
            <option value="Polimento" data-value="200">Polimento - R$ 200</option>
          </select>
        </div>
        <div>
          <label for="clientDate" class="block text-sm text-white/60 mb-2">Data do Atendimento</label>
          <input type="date" id="clientDate" class="form-input" required>
        </div>
        <button type="submit" class="btn-neon px-6 py-3 rounded-xl w-full">Adicionar</button>
      </form>
    </div>
  </div>

  <!-- SCRIPT FUNCIONAL -->
  <script>
    const btnNovoCliente = document.getElementById('btnNovoCliente');
    const modalNovoCliente = document.getElementById('modalNovoCliente');
    const closeModal = document.getElementById('closeModal');
    const formNovoCliente = document.getElementById('formNovoCliente');
    const clientsContainer = document.getElementById('clientsContainer');
    const emptyState = document.getElementById('emptyState');

    const totalClientesEl = document.getElementById('totalClientes');
    const atendimentosHojeEl = document.getElementById('atendimentosHoje');
    const receitaTotalEl = document.getElementById('receitaTotal');
    const servicoPopularEl = document.getElementById('servicoPopular');

    let clientes = [];

    btnNovoCliente.addEventListener('click', () => modalNovoCliente.classList.add('active'));
    closeModal.addEventListener('click', () => modalNovoCliente.classList.remove('active'));

    formNovoCliente.addEventListener('submit', e => {
      e.preventDefault();
      const nome = document.getElementById('clientName').value;
      const servicoSelect = document.getElementById('clientService');
      const servico = servicoSelect.value;
      const valor = parseFloat(servicoSelect.selectedOptions[0].dataset.value || 0);
      const data = document.getElementById('clientDate').value;

      const cliente = { nome, servico, valor, data };
      clientes.push(cliente);

      renderClientes();
      updateStats();
      formNovoCliente.reset();
      modalNovoCliente.classList.remove('active');
    });

    function renderClientes() {
      clientsContainer.innerHTML = '';
      if (clientes.length === 0) {
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';
      clientes.forEach((c) => {
        const card = document.createElement('div');
        card.className = 'glass-card rounded-2xl p-5';
        card.innerHTML = `
          <h3 class="font-bold text-lg mb-2">${c.nome}</h3>
          <p class="text-white/70 mb-1">Serviço: ${c.servico}</p>
          <p class="text-white/70 mb-1">Valor: R$ ${c.valor}</p>
          <p class="text-white/70 mb-1">Data: ${c.data}</p>
        `;
        clientsContainer.appendChild(card);
      });
    }

    function updateStats() {
      totalClientesEl.textContent = clientes.length;
      const hoje = new Date().toISOString().slice(0,10);
      const atendimentosHoje = clientes.filter(c => c.data === hoje).length;
      atendimentosHojeEl.textContent = atendimentosHoje;
      const receitaTotal = clientes.reduce((sum, c) => sum + c.valor, 0);
      receitaTotalEl.textContent = `R$ ${receitaTotal}`;
      const freq = {};
      clientes.forEach(c => freq[c.servico] = (freq[c.servico] || 0) + 1);
      let popular = '-';
      let max = 0;
      for (const serv in freq) {
        if (freq[serv] > max) { max = freq[serv]; popular = serv; }
      }
      servicoPopularEl.textContent = popular;
    }
  </script>
</body>
</html>
