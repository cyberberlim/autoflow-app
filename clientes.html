<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTOFLOW | Clientes</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      display: flex;
      background: linear-gradient(145deg, #000000, #0a0f12);
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #0d1117, #0a0f12);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      padding: 20px;
      position: fixed;
      height: 100vh;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #00ff99;
      margin-bottom: 40px;
      text-align: center;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .nav a {
      text-decoration: none;
      color: #aaa;
      font-weight: 500;
      padding: 10px 15px;
      border-radius: 8px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .nav a:hover, .nav a.active {
      background: rgba(0, 255, 153, 0.1);
      color: #00ff99;
    }

    .logout {
      margin-top: auto;
      background: rgba(0, 255, 153, 0.1);
      color: #00ff99;
      border: none;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .logout:hover {
      background: rgba(0, 255, 153, 0.2);
    }

    /* Main content */
    .main {
      margin-left: 260px;
      padding: 40px;
      width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #fff;
    }

    .btn-novo {
      background: #00ff99;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .btn-novo:hover {
      background: #00e68a;
      transform: scale(1.03);
    }

    /* Formulário modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: rgba(20, 20, 25, 0.9);
      border-radius: 16px;
      padding: 30px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0, 255, 153, 0.1);
      backdrop-filter: blur(10px);
    }

    .modal-content h2 {
      color: #00ff99;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 15px;
    }

    label {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 6px;
    }

    input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.95rem;
    }

    input:focus {
      outline: none;
      border-color: #00ff99;
    }

    .btn-salvar {
      background: #00ff99;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .btn-salvar:hover {
      background: #00e68a;
    }

    /* Cards de clientes */
    .clientes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }

    .cliente-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .cliente-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 25px rgba(0, 255, 153, 0.15);
    }

    .cliente-nome {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }

    .cliente-info {
      font-size: 0.9rem;
      color: #ccc;
      margin-bottom: 6px;
    }

    .cliente-valor {
      color: #00ff99;
      font-weight: 600;
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
      }
      .main {
        margin-left: 220px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">AUTOFLOW</div>
    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="clientes.html" class="active">Clientes</a>
      <a href="#">Agendamentos</a>
      <a href="#">Produtos</a>
      <a href="#">Relatórios</a>
      <a href="#">Configurações</a>
    </nav>
    <button class="logout">⏻ Logout</button>
  </aside>

  <main class="main">
    <div class="header">
      <h1>Clientes</h1>
      <button class="btn-novo" onclick="abrirModal()">+ Novo Cliente</button>
    </div>

    <div class="clientes-grid">
      <div class="cliente-card">
        <div class="cliente-nome">João Silva</div>
        <div class="cliente-info">Veículo: BMW X1</div>
        <div class="cliente-info">Data: 15/02/2026</div>
        <div class="cliente-valor">R$ 350,00</div>
      </div>

      <div class="cliente-card">
        <div class="cliente-nome">Maria Oliveira</div>
        <div class="cliente-info">Serviço: Vitrificação</div>
        <div class="cliente-info">Data: 10/02/2026</div>
        <div class="cliente-valor">R$ 800,00</div>
      </div>

      <div class="cliente-card">
        <div class="cliente-nome">Carlos Mendes</div>
        <div class="cliente-info">Serviço: Polimento técnico</div>
        <div class="cliente-info">Data: 20/01/2026</div>
        <div class="cliente-valor">R$ 500,00</div>
      </div>
    </div>
  </main>

  <div class="modal" id="modalCliente">
    <div class="modal-content">
      <h2>Novo Cliente</h2>
      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite o nome do cliente">
      </div>
      <div class="form-group">
        <label for="veiculo">Veículo / Serviço</label>
        <input type="text" id="veiculo" placeholder="Ex: Honda Civic / Polimento técnico">
      </div>
      <div class="form-group">
        <label for="data">Data</label>
        <input type="date" id="data">
      </div>
      <div class="form-group">
        <label for="valor">Valor</label>
        <input type="text" id="valor" placeholder="Ex: R$ 450,00">
      </div>
      <button class="btn-salvar" onclick="fecharModal()">Salvar Cliente</button>
    </div>
  </div>

  <script>
    function abrirModal() {
      document.getElementById('modalCliente').style.display = 'flex';
    }
    function fecharModal() {
      document.getElementById('modalCliente').style.display = 'none';
    }
  </script>
</body>
</html>
