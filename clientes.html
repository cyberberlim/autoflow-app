<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - AUTOFLOW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #111111 50%, #0d0d0d 100%); color: #fff; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .gradient-text { background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: -0.5px; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); border:1px solid rgba(255,255,255,0.1); transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
    .glass-card:hover { background: rgba(255,255,255,0.08); border-color: rgba(0,255,136,0.3); transform: translateY(-4px); box-shadow:0 20px 40px rgba(0,0,0,0.4),0 0 30px rgba(0,255,136,0.1); }
    .btn-neon { background: linear-gradient(135deg,#00ff88 0%,#00d4ff 100%); color:#000;font-weight:600;transition:all 0.3s; box-shadow:0 4px 20px rgba(0,255,136,0.3); position:relative; overflow:hidden; }
    .btn-neon:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,255,136,0.5),0 0 20px rgba(0,212,255,0.3);}
    .btn-neon:disabled { opacity:0.5; cursor:not-allowed; }
    .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); justify-content:center; align-items:center; z-index:100; }
    .modal-overlay.active { display:flex; }
    .modal-content { background: linear-gradient(135deg,#1a1a1a 0%,#111 100%); border:1px solid rgba(255,255,255,0.1); border-radius:1.5rem; padding:2rem; max-width:500px; width:90%; max-height:90%; overflow-y:auto; animation: modalSlideIn 0.3s ease; }
    @keyframes modalSlideIn { from {opacity:0; transform:translateY(-20px) scale(0.95);} to {opacity:1; transform:translateY(0) scale(1);} }
    .form-input, .form-select { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:0.75rem; padding:0.875rem 1rem; color:#fff; font-size:0.95rem; }
    .form-input:focus, .form-select:focus { outline:none; border-color:rgba(0,255,136,0.5); box-shadow:0 0 20px rgba(0,255,136,0.1);}
    .empty-state { text-align:center; padding:4rem 2rem; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body class="h-full">

<!-- Sidebar -->
<aside class="sidebar w-64 glass fixed left-0 top-0 h-full flex flex-col z-50">
  <div class="p-6 border-b border-white/5">
    <div class="logo-container">
      <div class="logo-text">AUTOFLOW</div>
      <div class="logo-subtitle">Sistema de Gestão</div>
    </div>
  </div>
</aside>

<!-- Main Content -->
<main class="main-content flex-1 ml-64 p-8 overflow-y-auto h-full">
  <header class="flex items-center justify-between mb-8">
    <h1 class="font-display text-3xl font-bold">Clientes</h1>
    <button id="btnNovoCliente" class="btn-neon px-6 py-3 rounded-xl flex items-center gap-2">
      Novo Cliente
    </button>
  </header>

  <div id="clientsContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    <div id="emptyState" class="col-span-full empty-state">
      <p class="text-lg font-medium mb-2">Nenhum cliente cadastrado</p>
      <p class="text-sm">Clique em "Novo Cliente" para adicionar o primeiro atendimento</p>
    </div>
  </div>
</main>

<!-- Modal Novo Cliente -->
<div id="modalNovoCliente" class="modal-overlay">
  <div class="modal-content">
    <div class="flex items-center justify-between mb-6">
      <h2 class="font-display text-xl font-bold">Novo Atendimento</h2>
      <button type="button" id="closeModal" class="p-2 rounded-lg hover:bg-white/10 transition-colors">
        ✖
      </button>
    </div>

    <form id="formNovoCliente" class="space-y-4">
      <div>
        <label for="clientName">Nome do Cliente</label>
        <input type="text" id="clientName" class="form-input" placeholder="Digite o nome do cliente" required>
      </div>

      <div>
        <label for="clientService">Serviço Realizado</label>
        <select id="clientService" class="form-select" required>
          <option value="">Selecione o serviço</option>
          <option value="Lavagem Simples">Lavagem Simples - R$ 50</option>
          <option value="Lavagem Detalhada">Lavagem Detalhada - R$ 80</option>
          <option value="Lavagem Completa">Lavagem Completa - R$ 120</option>
          <option value="Polimento">Polimento - R$ 200</option>
        </select>
      </div>

      <div>
        <label for="clientDate">Data do Atendimento</label>
        <input type="date" id="clientDate" class="form-input" required>
      </div>

      <button type="submit" class="btn-neon px-6 py-3 rounded-xl flex items-center gap-2">
        Cadastrar Cliente
      </button>
    </form>
  </div>
</div>

<script>
  // ===== Modal =====
  const btnNovoCliente = document.getElementById('btnNovoCliente');
  const modalNovoCliente = document.getElementById('modalNovoCliente');
  const closeModal = document.getElementById('closeModal');

  btnNovoCliente.addEventListener('click', () => modalNovoCliente.classList.add('active'));
  closeModal.addEventListener('click', () => modalNovoCliente.classList.remove('active'));
  modalNovoCliente.addEventListener('click', (e) => { if(e.target === modalNovoCliente) modalNovoCliente.classList.remove('active'); });

  // ===== Cadastro =====
  const formNovoCliente = document.getElementById('formNovoCliente');
  const clientsContainer = document.getElementById('clientsContainer');
  const emptyState = document.getElementById('emptyState');
  const totalClientes = document.createElement('p');
  totalClientes.className = 'text-xl font-bold text-green-400';
  let clientes = [];

  formNovoCliente.addEventListener('submit', (e) => {
    e.preventDefault();
    const nome = document.getElementById('clientName').value;
    const servico = document.getElementById('clientService').value;
    const data = document.getElementById('clientDate').value;

    const novoCliente = { nome, servico, data };
    clientes.push(novoCliente);

    atualizarClientes();
    modalNovoCliente.classList.remove('active');
    formNovoCliente.reset();
  });

  function atualizarClientes() {
    clientsContainer.innerHTML = '';
    if(clientes.length === 0){
      clientsContainer.appendChild(emptyState);
    } else {
      clientes.forEach(c => {
        const card = document.createElement('div');
        card.className = 'glass-card p-4 rounded-xl';
        card.innerHTML = `
          <h3 class="font-bold">${c.nome}</h3>
          <p>${c.servico}</p>
          <p class="text-sm text-white/50">${c.data}</p>
        `;
        clientsContainer.appendChild(card);
      });
    }
  }
</script>

</body>
 </html>
