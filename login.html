<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTOFLOW - Login</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.4)); }
      50% { filter: drop-shadow(0 0 40px rgba(0, 255, 136, 0.7)); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    @keyframes border-glow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    .neon-text {
      background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(0, 255, 136, 0.5));
    }
    
    .glass-card {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 255, 136, 0.2);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 60px rgba(0, 255, 136, 0.1);
    }
    
    .input-field {
      background: rgba(24, 24, 27, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }
    
    .input-field:focus {
      border-color: #00ff88;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), inset 0 0 20px rgba(0, 255, 136, 0.05);
      outline: none;
    }
    
    .btn-neon {
      background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
      background-size: 200% 200%;
      animation: gradient-shift 3s ease infinite;
      transition: all 0.3s ease;
    }
    
    .btn-neon:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(0, 255, 136, 0.4), 0 0 60px rgba(0, 212, 255, 0.3);
    }
    
    .btn-neon:active {
      transform: translateY(0);
    }
    
    .car-glow {
      animation: pulse-glow 3s ease-in-out infinite;
    }
    
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    
    .border-glow-animation {
      animation: border-glow 2s ease-in-out infinite;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>

 <body class="h-full bg-black overflow-auto" style="font-family: 'Inter', sans-serif;">
  <div class="h-full w-full relative flex items-center justify-center p-4" style="background: linear-gradient(135deg, #000000 0%, #18181b 50%, #0a0a0a 100%);">

       <svg class="w-8 h-8" viewbox="0 0 24 24" fill="none">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /> <path d="M2 17L12 22L22 17" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /> <path d="M2 12L12 17L22 12" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /> <defs>
         <lineargradient id="logoGrad" x1="2" y1="2" x2="22" y2="22">

        </svg>
       </div><input type="email" id="email" placeholder="Email" class="input-field w-full pl-12 pr-4 py-4 rounded-xl text-white placeholder-gray-500" required>
      </div><!-- Password Field -->
      <div class="relative">
       <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewbox="0 0 24 24">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
       </div><input type="password" id="password" placeholder="Senha" class="input-field w-full pl-12 pr-12 py-4 rounded-xl text-white placeholder-gray-500" required> <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-[#00ff88] transition-colors">
        <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg></button>
      </div><!-- Remember & Forgot -->
      <div class="flex items-center justify-between text-sm">
       <label class="flex items-center cursor-pointer group"> <input type="checkbox" class="sr-only peer">
        <div class="w-5 h-5 rounded border border-gray-600 flex items-center justify-center peer-checked:bg-gradient-to-r peer-checked:from-[#00ff88] peer-checked:to-[#00d4ff] peer-checked:border-transparent transition-all group-hover:border-[#00ff88]/50">
         <svg class="w-3 h-3 text-black hidden peer-checked:block" fill="none" stroke="currentColor" viewbox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
         </svg>
        </div><span class="ml-2 text-gray-400 group-hover:text-gray-300 transition-colors">Lembrar-me</span> </label> <a href="#" class="text-gray-400 hover:text-[#00ff88] transition-colors">Esqueceu a senha?</a>
      </div><!-- Submit Button --> <button type="submit" id="submit-btn" class="btn-neon w-full py-4 rounded-xl text-black font-bold text-lg tracking-wide mt-6"> <span id="button-text">Entrar</span> </button>
     </form><!-- Divider -->
     <div class="flex items-center my-6">
      <div class="flex-1 h-px bg-gradient-to-r from-transparent via-gray-700 to-transparent"></div><span class="px-4 text-gray-600 text-xs uppercase tracking-wider">ou continue com</span>
      <div class="flex-1 h-px bg-gradient-to-r from-transparent via-gray-700 to-transparent"></div>
     </div><!-- Social Login -->
     <div class="flex gap-3">
      <button class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl bg-[#18181b] border border-gray-800 hover:border-[#00ff88]/50 transition-all group">
       <svg class="w-5 h-5 text-gray-400 group-hover:text-white transition-colors" viewbox="0 0 24 24">
        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" /> <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" /> <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" /> <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
       </svg><span class="text-gray-400 text-sm group-hover:text-white transition-colors">Google</span> </button> <button class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl bg-[#18181b] border border-gray-800 hover:border-[#00ff88]/50 transition-all group">
       <svg class="w-5 h-5 text-gray-400 group-hover:text-white transition-colors" fill="currentColor" viewbox="0 0 24 24">
        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
       </svg><span class="text-gray-400 text-sm group-hover:text-white transition-colors">GitHub</span> </button>
     </div><!-- Sign Up Link -->
     <p class="text-center text-gray-500 text-sm mt-6">Não tem uma conta? <a href="#" class="text-[#00ff88] hover:text-[#00d4ff] transition-colors font-medium">Criar conta</a></p>
    </div><!-- Footer -->
    <p class="text-center text-gray-600 text-xs mt-6 tracking-wide">© 2024 AUTOFLOW. Todos os direitos reservados.</p>
   </div>
   <script>
    const defaultConfig = {
      brand_name: 'AUTOFLOW',
      tagline: 'Sistema inteligente para estética automotiva',
      button_text: 'Entrar',
      background_color: '#000000',
      primary_color: '#00ff88',
      secondary_color: '#00d4ff',
      text_color: '#ffffff',
      surface_color: '#18181b'
    };
    
    // Toggle password visibility
    const togglePassword = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eye-icon');
    
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      if (type === 'text') {
        eyeIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
        `;
      } else {
        eyeIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        `;
      }
    });
    
    // Element SDK initialization
    async function onConfigChange(config) {
      const brandName = document.getElementById('brand-name');
      const tagline = document.getElementById('tagline');
      const buttonText = document.getElementById('button-text');
      
      if (brandName) brandName.textContent = config.brand_name || defaultConfig.brand_name;
      if (tagline) tagline.textContent = config.tagline || defaultConfig.tagline;
      if (buttonText) buttonText.textContent = config.button_text || defaultConfig.button_text;
    }
    
    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => {
              config.primary_color = value;
              window.elementSdk.setConfig({ primary_color: value });
            }
          },
          {
            get: () => config.secondary_color || defaultConfig.secondary_color,
            set: (value) => {
              config.secondary_color = value;
              window.elementSdk.setConfig({ secondary_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }
    
    function mapToEditPanelValues(config) {
      return new Map([
        ['brand_name', config.brand_name || defaultConfig.brand_name],
        ['tagline', config.tagline || defaultConfig.tagline],
        ['button_text', config.button_text || defaultConfig.button_text]
      ]);
    }
    
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>

document.getElementById("login-form").addEventListener("submit", function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const senha = document.getElementById("password").value;

  if (email === "admin@autoflow.com" && senha === "123456") {
    localStorage.setItem("logado", "true");
    window.location.href = "dashboard.html";
  } else {

  }
