<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login - AUTOFLOW</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-zinc-900 to-black text-white flex items-center justify-center h-screen">

<div class="bg-zinc-900/80 backdrop-blur-xl p-10 rounded-2xl shadow-2xl w-96 border border-zinc-700">

<h2 class="text-3xl font-bold mb-6 text-center bg-gradient-to-r from-[#00ff88] to-[#00d4ff] bg-clip-text text-transparent">
AUTOFLOW
</h2>

<input id="email" type="email" placeholder="Email" class="w-full p-3 mb-4 rounded-lg bg-zinc-800 border border-zinc-700">
<input id="senha" type="password" placeholder="Senha" class="w-full p-3 mb-6 rounded-lg bg-zinc-800 border border-zinc-700">

<button id="btn-login" class="w-full py-3 rounded-lg font-bold bg-gradient-to-r from-[#00ff88] to-[#00d4ff] text-black">
Entrar
</button>

<div id="mensagem-erro" class="text-red-500 text-sm mt-4 text-center"></div>

</div>

<script>
// Usuário e senha definidos aqui
const usuarioValido = "admin@autoflow.com";
const senhaValida = "123456";

document.getElementById("btn-login").addEventListener("click", function() {
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();
  const mensagemErro = document.getElementById("mensagem-erro");

  if (email === usuarioValido && senha === senhaValida) {
    // Redireciona para dashboard
    window.location.href = "dashboard.html";
  } else {
    mensagemErro.textContent = "Email ou senha incorretos!";
  }
});
</script>

</body>
</html>
