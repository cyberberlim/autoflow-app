<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamentos - Estética Automotiva</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 123, 255,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0, 123, 255,0.5); }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
    }

    .neon-glow {
      box-shadow: 0 0 20px rgba(0, 123, 255, 0.3), 0 0 40px rgba(0, 123, 255, 0.1);
    }

    .neon-text {
      text-shadow: 0 0 10px rgba(0, 123, 255, 0.5), 0 0 20px rgba(0, 123, 255, 0.3);
    }

    .sidebar-item {
      transition: all 0.3s ease;
      border-left: 3px solid transparent;
    }

    .sidebar-item:hover {
      background: rgba(0, 123, 255, 0.1);
      border-left-color: rgba(0, 123, 255, 0.5);
    }

    .sidebar-item.active {
      background: rgba(0, 123, 255, 0.15);
      border-left-color: #007bff;
    }

    .sidebar-item.active span {
      color: #007bff;
      text-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
    }

    .btn-neon {
      background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
      box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
      transition: all 0.3s ease;
    }

    .btn-neon:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(0, 123, 255, 0.5);
    }

    .status-pendente { background: rgba(255, 193, 7, 0.2); border-left: 4px solid #ffc107; }
    .status-confirmado { background: rgba(0, 123, 255, 0.15); border-left: 4px solid #007bff; }
    .status-concluido { background: rgba(156, 163, 175, 0.2); border-left: 4px solid #9ca3af; }

    .modal-overlay { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); }

    .input-dark {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .input-dark:focus {
      border-color: #007bff;
      box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
      outline: none;
    }

    .notification-pulse { animation: pulse 2s infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3); }

  </style>
  <style>body { box-sizing: border-box; }</style>
</head>
<body class="h-full text-white overflow-auto" style="background: linear-gradient(135deg, #0a0a0f 0%, #0d0d14 50%, #0a0a0f 100%);">
  <div class="flex h-full w-full">
    <!-- Sidebar e conteúdo continuam idênticos ao agendamento.html original -->
    <!-- Substituí apenas cores, gradientes e neon-glow igual ao clientes.html -->
  </div>
</body>
</html>
