<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamentos - Estética Automotiva</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/style.css">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="_sdk/element_sdk.js"></script>
  <script src="_sdk/data_sdk.js"></script>
  <style>
    /* Estilos específicos do modal e Canva */
    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; }
    .neon-glow { box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), 0 0 40px rgba(0, 255, 136, 0.1); }
    .neon-text { text-shadow: 0 0 10px rgba(0, 255, 136, 0.5), 0 0 20px rgba(0, 255, 136, 0.3); }
    .btn-neon { background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%); box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4); transition: all 0.3s ease; }
    .btn-neon:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(0, 255, 136, 0.5); }
    .input-dark { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
    .input-dark:focus { border-color: #00ff88; box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1); outline: none; }
    .modal-overlay { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); }
  </style>
</head>
<body class="h-full">

  <!-- Sidebar existente -->
  <div class="sidebar">
    <div class="logo">AutoFlow</div>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="agendamento.html" class="active">Agendamentos</a>
      <a href="clientes.html">Clientes</a>
      <a href="produtos.html">Produtos</a>
      <a href="estoque.html">Estoque</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="configuracoes.html">Configurações</a>
      <button class="logout-btn">Sair</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="main-content">
    <h1 class="text-2xl font-bold mb-6 text-white">Agendamentos</h1>
    <p class="text-white mb-4">Aqui você pode gerenciar os agendamentos de clientes.</p>
    
    <!-- Botão para abrir modal -->
    <button onclick="openModal(false)" class="btn-neon px-6 py-3 rounded-xl font-semibold text-gray-900 mb-6">Novo Agendamento</button>

    <!-- Modal Novo/Editar Agendamento -->
    <div id="modal-agendamento" class="fixed inset-0 z-50 hidden">
      <div class="modal-overlay absolute inset-0" id="modal-overlay"></div>
      <div class="relative flex items-center justify-center min-h-full p-4">
        <div class="glass-card w-full max-w-lg p-8 relative">
          <button id="modal-close" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-gray-700/50 flex items-center justify-center text-gray-400 hover:text-white hover:bg-gray-600/50 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <h2 id="modal-title" class="text-2xl font-bold mb-6 neon-text">Novo Agendamento</h2>
          <form id="form-agendamento" class="space-y-5">
            <input type="hidden" id="agendamento-id">
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">Cliente *</label>
              <input type="text" id="input-cliente" placeholder="Nome do cliente" class="w-full px-4 py-3 input-dark rounded-xl text-white placeholder-gray-500" required>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">Serviço *</label>
              <select id="input-servico" class="w-full px-4 py-3 input-dark rounded-xl text-white" required>
                <option value="">Selecione o serviço</option>
                <option value="Lavagem Simples">Lavagem Simples</option>
                <option value="Lavagem Detalhada">Lavagem Detalhada</option>
                <option value="Polimento">Polimento</option>
                <option value="Cristalização">Cristalização</option>
                <option value="Vitrificação">Vitrificação</option>
                <option value="Higienização Interna">Higienização Interna</option>
                <option value="Limpeza de Motor">Limpeza de Motor</option>
                <option value="Proteção de Pintura">Proteção de Pintura</option>
              </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Data *</label>
                <input type="date" id="input-data" class="w-full px-4 py-3 input-dark rounded-xl text-white" required>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Horário *</label>
                <input type="time" id="input-horario" class="w-full px-4 py-3 input-dark rounded-xl text-white" required>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">Status</label>
              <select id="input-status" class="w-full px-4 py-3 input-dark rounded-xl text-white">
                <option value="pendente">Pendente</option>
                <option value="confirmado">Confirmado</option>
                <option value="concluido">Concluído</option>
              </select>
            </div>
            <div class="flex justify-end">
              <button type="submit" class="btn-neon px-6 py-3 rounded-xl font-semibold text-gray-900">Salvar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Corrigir viewBox em todos os SVGs
    document.querySelectorAll('svg').forEach(svg => {
      if (svg.hasAttribute('viewbox')) {
        svg.setAttribute('viewBox', svg.getAttribute('viewbox'));
        svg.removeAttribute('viewbox');
      }
    });

    // Funções de modal
    function openModal(editMode) {
      const modal = document.getElementById('modal-agendamento');
      const title = document.getElementById('modal-title');
      title.textContent = editMode ? 'Editar Agendamento' : 'Novo Agendamento';
      modal.classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal-agendamento').classList.add('hidden');
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', closeModal);
  </script>
</body>
</html>
