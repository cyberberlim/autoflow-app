<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTOFLOW - Agendamentos</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    html, body { height: 100%; margin:0; padding:0; }
    * { font-family: 'Inter', sans-serif; }
    .app-wrapper { height:100%; width:100%; overflow:auto; background: linear-gradient(135deg, #0a0a0f 0%, #0d0d14 50%, #0a0a0f 100%); }
    .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
    .glass-card-hover { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
    .glass-card-hover:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); transform: translateY(-2px); box-shadow:0 20px 40px rgba(0,0,0,0.3); }
    .neon-green { color:#00ff88; text-shadow:0 0 20px rgba(0,255,136,0.4); }
    .neon-cyan { color:#00d4ff; text-shadow:0 0 20px rgba(0,212,255,0.4); }
    .btn-neon { background: linear-gradient(135deg, rgba(0,255,136,0.15) 0%, rgba(0,212,255,0.15) 100%); border:1px solid rgba(0,255,136,0.3); transition: all 0.3s ease; }
    .btn-neon:hover { background: linear-gradient(135deg, rgba(0,255,136,0.25) 0%, rgba(0,212,255,0.25) 100%); border-color: rgba(0,255,136,0.5); box-shadow:0 0 30px rgba(0,255,136,0.2); }
    .btn-green-neon { background: linear-gradient(135deg, rgba(0,255,136,0.2) 0%, rgba(0,200,100,0.2) 100%); border:1px solid rgba(0,255,136,0.4); transition: all 0.3s ease; }
    .btn-green-neon:hover { background: linear-gradient(135deg, rgba(0,255,136,0.35) 0%, rgba(0,200,100,0.35) 100%); box-shadow:0 0 30px rgba(0,255,136,0.3); }
    .sidebar-item { transition: all 0.2s ease; }
    .sidebar-item:hover { background: rgba(255,255,255,0.05); }
    .sidebar-item.active { background: linear-gradient(90deg, rgba(0,255,136,0.1) 0%, transparent 100%); border-left:3px solid #00ff88; padding-left:calc(1rem - 3px); }
    .modal-backdrop { background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
    .input-field { background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); transition: all 0.2s ease; color:white; }
    .input-field::placeholder { color: rgba(255,255,255,0.4); }
    .input-field:focus { outline:none; border-color: rgba(0,255,136,0.5); box-shadow:0 0 20px rgba(0,255,136,0.1); }
    .scrollbar-thin::-webkit-scrollbar { width:4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius:2px; }
    .status-pendente { background: rgba(251,191,36,0.1); color:#fbbf24; }
    .status-confirmado { background: rgba(0,212,255,0.1); color:#00d4ff; }
    .status-concluido { background: rgba(0,255,136,0.1); color:#00ff88; }
    @keyframes fadeIn { from {opacity:0; transform: scale(0.95);} to {opacity:1; transform: scale(1);} }
    .animate-fadeIn { animation: fadeIn 0.3s ease forwards; }
    @keyframes slideIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }
    .animate-slideIn { animation: slideIn 0.4s ease forwards; }
    select { background-image:url('data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22rgba(255,255,255,0.6)%22 stroke-width=%222%22%3E%3Cpath stroke-linecap=%22round%22 stroke-linejoin=%22round%22 d=%22M19 9l-7 7-7-7%22/%3E%3C/svg%3E'); background-repeat:no-repeat; background-position:right 1rem center; background-size:1.25rem; padding-right:3rem; appearance:none; }
    select option { background:#0a0a0f; color:white; }
  </style>
  <style>body { box-sizing: border-box; }</style>
</head>
<body class="h-full">
<div class="app-wrapper font-sans">
<!-- ... aqui entra todo o seu HTML do layout e sidebar ... -->

<!-- Agendamentos Container e botões já estão no HTML enviado -->

<script>
// --- Funções de Agendamentos ---
let agendamentos = JSON.parse(localStorage.getItem('agendamentos')) || [];

const agendamentosContainer = document.getElementById('agendamentos-container');
const emptyState = document.getElementById('empty-state');
const statTotal = document.getElementById('stat-total');
const statPendentes = document.getElementById('stat-pendentes');
const statConfirmados = document.getElementById('stat-confirmados');
const statConcluidos = document.getElementById('stat-concluidos');

// Atualiza estatísticas
function atualizarStats() {
  statTotal.textContent = agendamentos.length;
  statPendentes.textContent = agendamentos.filter(a => a.status === 'Pendente').length;
  statConfirmados.textContent = agendamentos.filter(a => a.status === 'Confirmado').length;
  statConcluidos.textContent = agendamentos.filter(a => a.status === 'Concluído').length;
}

// Renderiza agendamentos
function renderAgendamentos() {
  agendamentosContainer.innerHTML = '';
  if(agendamentos.length === 0){
    emptyState.classList.remove('hidden');
  } else {
    emptyState.classList.add('hidden');
    agendamentos.forEach((a,i)=>{
      const div = document.createElement('div');
      div.className = 'glass-card p-6 rounded-2xl flex flex-col';
      div.innerHTML = `
        <p class="text-lg font-semibold text-white mb-2">${a.cliente}</p>
        <p class="text-gray-400 text-sm mb-1">${a.servico}</p>
        <p class="text-sm ${a.status==='Pendente'?'status-pendente': a.status==='Confirmado'?'status-confirmado':'status-concluido'}">${a.status}</p>
        <p class="text-gray-400 text-xs mt-2">${a.data}</p>
      `;
      agendamentosContainer.appendChild(div);
    });
  }
  atualizarStats();
}

// Cadastrar novo agendamento (simples modal)
document.getElementById('btn-new-agendamento').addEventListener('click', () => {
  const cliente = prompt("Nome do Cliente:");
  if(!cliente) return;
  const servico = prompt("Serviço:");
  if(!servico) return;
  const data = prompt("Data (AAAA-MM-DD):");
  if(!data) return;
  const status = prompt("Status (Pendente, Confirmado, Concluído):","Pendente");
  agendamentos.push({cliente, servico, data, status});
  localStorage.setItem('agendamentos', JSON.stringify(agendamentos));
  renderAgendamentos();
});

// Filtros
document.getElementById('search-input').addEventListener('input', e => {
  const termo = e.target.value.toLowerCase();
  agendamentosContainer.innerHTML = '';
  const filtrados = agendamentos.filter(a => a.cliente.toLowerCase().includes(termo) || a.servico.toLowerCase().includes(termo));
  if(filtrados.length===0){ emptyState.classList.remove('hidden'); } else { emptyState.classList.add('hidden'); }
  filtrados.forEach(a=>{
    const div = document.createElement('div');
    div.className = 'glass-card p-6 rounded-2xl flex flex-col';
    div.innerHTML = `
      <p class="text-lg font-semibold text-white mb-2">${a.cliente}</p>
      <p class="text-gray-400 text-sm mb-1">${a.servico}</p>
      <p class="text-sm ${a.status==='Pendente'?'status-pendente': a.status==='Confirmado'?'status-confirmado':'status-concluido'}">${a.status}</p>
      <p class="text-gray-400 text-xs mt-2">${a.data}</p>
    `;
    agendamentosContainer.appendChild(div);
  });
  atualizarStats();
});

document.getElementById('status-filter').addEventListener('change', e => {
  const status = e.target.value;
  agendamentosContainer.innerHTML = '';
  const filtrados = status ? agendamentos.filter(a => a.status === status) : agendamentos;
  if(filtrados.length===0){ emptyState.classList.remove('hidden'); } else { emptyState.classList.add('hidden'); }
  filtrados.forEach(a=>{
    const div = document.createElement('div');
    div.className = 'glass-card p-6 rounded-2xl flex flex-col';
    div.innerHTML = `
      <p class="text-lg font-semibold text-white mb-2">${a.cliente}</p>
      <p class="text-gray-400 text-sm mb-1">${a.servico}</p>
      <p class="text-sm ${a.status==='Pendente'?'status-pendente': a.status==='Confirmado'?'status-confirmado':'status-concluido'}">${a.status}</p>
      <p class="text-gray-400 text-xs mt-2">${a.data}</p>
    `;
    agendamentosContainer.appendChild(div);
  });
  atualizarStats();
});

document.getElementById('date-filter').addEventListener('change', e => {
  const data = e.target.value;
  agendamentosContainer.innerHTML = '';
  const filtrados = data ? agendamentos.filter(a => a.data===data) : agendamentos;
  if(filtrados.length===0){ emptyState.classList.remove('hidden'); } else { emptyState.classList.add('hidden'); }
  filtrados.forEach(a=>{
    const div = document.createElement('div');
    div.className = 'glass-card p-6 rounded-2xl flex flex-col';
    div.innerHTML = `
      <p class="text-lg font-semibold text-white mb-2">${a.cliente}</p>
      <p class="text-gray-400 text-sm mb-1">${a.servico}</p>
      <p class="text-sm ${a.status==='Pendente'?'status-pendente': a.status==='Confirmado'?'status-confirmado':'status-concluido'}">${a.status}</p>
      <p class="text-gray-400 text-xs mt-2">${a.data}</p>
    `;
    agendamentosContainer.appendChild(div);
  });
  atualizarStats();
});

// Limpar filtros
function clearFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('status-filter').value = '';
  document.getElementById('date-filter').value = '';
  renderAgendamentos();
}

// Inicializa
renderAgendamentos();
</script>
</div>
</body>
 </html>
